<svg viewBox="-2 -2 24 36" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.85)"/>
      <stop offset="40%" stop-color="rgba(200,220,255,0.5)"/>
      <stop offset="100%" stop-color="rgba(180,200,255,0.7)"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.6)"/>
    </linearGradient>
    <filter id="sh">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.3"/>
    </filter>
  </defs>
  <!-- shadow -->
  <path d="M 1,2 L 1,29 L 7.4,23 L 12.2,33 L 17,31 L 12.2,21 L 20.2,21 Z" fill="rgba(0,0,0,0.3)" filter="url(#sh)"/>
  <!-- glass fill -->
  <path d="M 0,0 L 0,28 L 6.4,22 L 11.2,32 L 16,30 L 11.2,20 L 19.2,20 Z" fill="url(#glass)"/>
  <!-- specular edge -->
  <path d="M 0,0 L 0,28 L 6.4,22 L 11.2,32 L 16,30 L 11.2,20 L 19.2,20 Z" fill="none" stroke="url(#edge)" stroke-width="0.7" stroke-linejoin="round"/>
</svg>
